<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>onewish — my wishes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0d0f; --bg-panel:#15171a; --bg-card:#1b1e22; --border:#2a2d31;
    --maroon:#7a1730; --maroon-bright:#b02b4c; --green:#1f6b4a; --green-bright:#33a072;
    --white:#f5f3ef; --dim:#9c9b97;
    --serif:'Cormorant Garamond', serif; --sans:'Work Sans', sans-serif;
  }
  *{margin:0; padding:0; box-sizing:border-box;}
  body{background:var(--bg); color:var(--white); font-family:var(--sans); line-height:1.6;}
  a{color:var(--green-bright);}
  .wrap{max-width:760px; margin:0 auto; padding:0 24px;}
  nav{position:sticky; top:0; z-index:40; background:rgba(12,13,15,0.9); backdrop-filter:blur(10px); border-bottom:1px solid var(--border);}
  .navwrap{max-width:760px; margin:0 auto; padding:0 24px; height:58px; display:flex; align-items:center; justify-content:space-between;}
  .brand{font-family:var(--serif); font-weight:700; font-size:19px;}
  .brand a{color:var(--white); text-decoration:none;}
  h1{font-family:var(--serif); font-weight:700; font-size:30px; margin:38px 0 6px;}
  .sub{color:var(--dim); font-size:14px; margin-bottom:30px;}

  #loginBox{text-align:center; background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:40px 24px; margin-top:20px;}
  #loginBox p{color:var(--dim); margin-bottom:18px;}
  .btn{padding:12px 26px; border-radius:8px; border:none; background:var(--maroon-bright); color:#fff; font-weight:600; font-size:14px; cursor:pointer;}

  .wish-card{background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:20px 22px; margin-bottom:14px;}
  .wc-top{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:10px;}
  .wc-code{font-family:monospace; color:var(--green-bright); font-size:14px;}
  .status-pill{font-size:11px; padding:4px 12px; border-radius:20px; border:1px solid var(--border); text-transform:capitalize;}
  .status-pending_quote{color:#e8c23d; border-color:#4a3a20;}
  .status-quoted{color:#6fa8a0; border-color:#243b38;}
  .status-paid, .status-accepted{color:var(--green-bright); border-color:#1f4030;}
  .status-rejected{color:var(--maroon-bright); border-color:#4a1f28;}
  .status-delivered{color:var(--dim);}
  .wc-cat{font-size:12px; color:var(--dim); margin-bottom:6px;}
  .wc-text{font-size:14px; color:var(--white); margin-bottom:10px;}
  .wc-price{font-family:var(--serif); font-size:20px; font-weight:700; color:var(--maroon-bright);}
  .wc-when{font-size:11.5px; color:#6b6a67; margin-top:8px;}

  .empty{text-align:center; color:var(--dim); padding:40px 0; font-size:14px;}
</style>
</head>
<body>

<nav>
  <div class="navwrap">
    <div class="brand"><a href="index.html">onewish</a></div>
    <div><a href="index.html" style="font-size:13px; color:var(--dim); text-decoration:none;">← back to site</a></div>
  </div>
</nav>

<div class="wrap">
  <h1>My wishes</h1>
  <div class="sub">Track the status of everything you've submitted.</div>

  <div id="loginBox">
    <p>Sign in to see your wishes.</p>
    <button class="btn" id="loginBtn">Continue with Google</button>
  </div>

  <div id="signedInBar" style="display:none; justify-content:space-between; align-items:center; background:var(--bg-card); border:1px solid var(--border); border-radius:8px; padding:10px 14px; margin-bottom:18px;">
    <span style="font-size:13px; color:var(--dim);">Signed in as <span id="signedInEmail" style="color:var(--white);"></span></span>
    <button type="button" id="signOutBtn" style="background:none; border:none; color:var(--green-bright); font-size:12.5px; cursor:pointer; text-decoration:underline;">Sign out</button>
  </div>

  <div id="list" style="display:none;"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-check-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  document.getElementById('loginBtn').addEventListener('click', ()=>{
    signInWithGoogle().catch(err=> alert('Sign-in failed: ' + err.message));
  });

  auth.onAuthStateChanged(user=>{
    const loginBox = document.getElementById('loginBox');
    const list = document.getElementById('list');
    const bar = document.getElementById('signedInBar');

    if(!user){
      loginBox.style.display = 'block';
      list.style.display = 'none';
      bar.style.display = 'none';
      return;
    }
    loginBox.style.display = 'none';
    list.style.display = 'block';
    bar.style.display = 'flex';
    document.getElementById('signedInEmail').textContent = user.email;
    loadMyWishes();
  });

  document.getElementById('signOutBtn').addEventListener('click', ()=> auth.signOut());

  function loadMyWishes(){
    const list = document.getElementById('list');
    list.innerHTML = '<div class="empty">Loading...</div>';

    getMyWishes().then(wishes=>{
      if(wishes.length === 0){
        list.innerHTML = '<div class="empty">No wishes yet. <a href="index.html#wish">Make your first one →</a></div>';
        return;
      }
      list.innerHTML = '';
      wishes.forEach(w=>{
        const when = w.createdAt && w.createdAt.toDate ? w.createdAt.toDate().toLocaleString() : '—';
        const card = document.createElement('div');
        card.className = 'wish-card';
        card.innerHTML = `
          <div class="wc-top">
            <span class="wc-code">${w.orderCode}</span>
            <span class="status-pill status-${w.status}">${(w.status||'').replace('_',' ')}</span>
          </div>
          <div class="wc-cat">${w.category}</div>
          <div class="wc-text">${w.wishText}</div>
          <div class="wc-price">₹${w.quotedPrice}</div>
          <div class="wc-when">${when}</div>
        `;
        list.appendChild(card);
      });
    }).catch(err=>{
      list.innerHTML = '<div class="empty">Could not load wishes: ' + err.message + '</div>';
    });
  }
</script>

</body>
</html>
